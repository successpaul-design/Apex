<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APEX">
<meta name="theme-color" content="#2d5a3d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>APEX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--a:#2d5a3d;--al:#3a7a52;--ad:rgba(45,90,61,.15);--bg:#0e1117;--c1:#161b22;--c2:#1c2333;--b:#252d3a;--t:#e6edf3;--t2:#8b949e;--r:#c9453a;--w:#d4a037}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',system-ui,sans-serif}
input,select,textarea{font-family:inherit;outline:none;background:var(--c2);border:1px solid var(--b);border-radius:8px;padding:10px 12px;color:var(--t);font-size:14px;width:100%;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:var(--al)}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative}
.screen{flex:1;overflow-y:auto;padding-bottom:8px;display:none}.screen.active{display:block}
.tab-bar{display:flex;border-top:1px solid var(--b);background:#0d1015;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));flex-shrink:0;z-index:50}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;background:none;color:var(--t2);font-size:10px;font-weight:500;transition:color .2s;position:relative}
.tab-btn.active{color:var(--al);font-weight:700}
.tab-btn .dot{width:6px;height:6px;border-radius:3px;background:var(--r);position:absolute;top:2px;right:calc(50% - 14px);display:none}
.tab-btn.has-session .dot{display:block}
.top-bar{padding:16px 16px 8px;position:sticky;top:0;background:var(--bg);z-index:20}
.card{background:var(--c1);border-radius:12px;padding:16px;border:1px solid var(--b);margin-bottom:8px}
.card-flush{background:var(--c1);border-radius:12px;border:1px solid var(--b);overflow:hidden;margin-bottom:10px}
.btn{background:var(--a);color:#fff;border-radius:10px;padding:12px 20px;font-weight:700;font-size:14px;width:100%;transition:opacity .2s}
.btn:disabled{opacity:.4}
.btn-sm{background:var(--ad);color:var(--al);border-radius:8px;padding:8px 14px;font-weight:600;font-size:12px}
.btn-danger{background:rgba(201,69,58,.13);color:var(--r)}
.badge{background:var(--ad);color:var(--al);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
.label{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.h2{font-size:17px;font-weight:700}
.h3{font-size:14px;font-weight:700}
.mono{font-family:'JetBrains Mono',monospace}
.row{display:flex;align-items:center;gap:10px}
.divider{height:1px;background:var(--b);margin:12px 0}
.muted{color:var(--t2);font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-inner{background:var(--c1);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;animation:slideUp .25s ease-out}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{text-align:center;padding:12px}.stat-val{font-size:22px;font-weight:800;margin-top:4px}.stat-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.routine-card{cursor:pointer;border-left:3px solid var(--a)}.routine-card:active{opacity:.8}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 44px;gap:6px;align-items:center;padding:3px 0}
.set-header{font-size:10px;color:var(--t2);font-weight:600;text-transform:uppercase;padding:8px 0 4px}
.check-btn{width:36px;height:36px;border-radius:8px;border:2px solid var(--b);background:transparent;display:flex;align-items:center;justify-content:center}
.check-btn.done{border-color:var(--al);background:var(--a)}
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap}
.chat-user{background:var(--a);border-bottom-right-radius:4px}
.chat-assistant{background:var(--c2);border-bottom-left-radius:4px}
.import-zone{text-align:center;cursor:pointer;padding:24px;border:1px dashed var(--a);background:var(--ad);border-radius:12px}
.color-dot{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.color-dot.sel{border-color:#fff}
.ex-pill{padding:6px 0;border-bottom:1px solid var(--b)}.ex-pill:last-child{border-bottom:none}
.progress-bar{height:3px;background:var(--b);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.loading-dots{display:flex;justify-content:center;gap:4px;padding:12px}
.loading-dots span{width:8px;height:8px;border-radius:4px;background:var(--al)}
.loading-dots span:nth-child(1){animation:pulse 1s ease-in-out 0s infinite}
.loading-dots span:nth-child(2){animation:pulse 1s ease-in-out .15s infinite}
.loading-dots span:nth-child(3){animation:pulse 1s ease-in-out .3s infinite}
.api-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:6px}
.api-on{background:var(--ad);color:var(--al)}.api-off{background:rgba(201,69,58,.1);color:var(--r)}
</style>
</head>
<body>
<div class="app" id="app">
<div class="screen active" id="screen-dash"></div>
<div class="screen" id="screen-lift"></div>
<div class="screen" id="screen-log"></div>
<div class="screen" id="screen-coach"></div>
<div class="screen" id="screen-config"></div>
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="dash" onclick="switchTab('dash')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg><span>Dash</span></button>
  <button class="tab-btn" data-tab="lift" onclick="switchTab('lift')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="10" width="20" height="4" rx="1"/><path d="M6 6v12M18 6v12"/></svg><span>Lift</span><div class="dot"></div></button>
  <button class="tab-btn" data-tab="log" onclick="switchTab('log')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg><span>Log</span></button>
  <button class="tab-btn" data-tab="coach" onclick="switchTab('coach')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Coach</span></button>
  <button class="tab-btn" data-tab="config" onclick="switchTab('config')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Config</span></button>
</div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal()"><div class="modal-inner" id="modalContent" onclick="event.stopPropagation()"></div></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════════
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

// ═══════════════════════════════════════════════════════════════
// CONSTANTS & SEED DATA
// ═══════════════════════════════════════════════════════════════
const COLORS=["#c9453a","#3a7a52","#d4a037","#3a6b9f","#8b5cf6","#e67e22","#16a085","#c0392b"];
const MUSCLES=["Chest","Back","Shoulders","Biceps","Triceps","Quads","Hamstrings","Glutes","Calves","Core","Forearms","Traps"];
const EQUIP=["Barbell","Dumbbell","Cable","Machine","Bodyweight","Kettlebell","Band","Smith Machine","EZ Bar","Trap Bar"];

const SEED_EX=[
  {id:"ex1",name:"Barbell Bench Press",muscles:["Chest","Triceps","Shoulders"],equipment:"Barbell",notes:""},
  {id:"ex2",name:"Barbell Squat",muscles:["Quads","Glutes","Core"],equipment:"Barbell",notes:""},
  {id:"ex3",name:"Barbell Deadlift",muscles:["Back","Hamstrings","Glutes","Core"],equipment:"Barbell",notes:""},
  {id:"ex4",name:"Overhead Press",muscles:["Shoulders","Triceps"],equipment:"Barbell",notes:""},
  {id:"ex5",name:"Barbell Row",muscles:["Back","Biceps"],equipment:"Barbell",notes:""},
  {id:"ex6",name:"Pull-ups",muscles:["Back","Biceps"],equipment:"Bodyweight",notes:""},
  {id:"ex7",name:"Dumbbell Curl",muscles:["Biceps"],equipment:"Dumbbell",notes:""},
  {id:"ex8",name:"Tricep Pushdown",muscles:["Triceps"],equipment:"Cable",notes:""},
  {id:"ex9",name:"Leg Press",muscles:["Quads","Glutes"],equipment:"Machine",notes:""},
  {id:"ex10",name:"Lat Pulldown",muscles:["Back","Biceps"],equipment:"Cable",notes:""},
  {id:"ex11",name:"Dumbbell Lateral Raise",muscles:["Shoulders"],equipment:"Dumbbell",notes:""},
  {id:"ex12",name:"Romanian Deadlift",muscles:["Hamstrings","Glutes","Back"],equipment:"Barbell",notes:""},
  {id:"ex13",name:"Cable Fly",muscles:["Chest"],equipment:"Cable",notes:""},
  {id:"ex14",name:"Leg Curl",muscles:["Hamstrings"],equipment:"Machine",notes:""},
  {id:"ex15",name:"Calf Raise",muscles:["Calves"],equipment:"Machine",notes:""},
  {id:"ex16",name:"Plank",muscles:["Core"],equipment:"Bodyweight",notes:""},
  {id:"ex17",name:"Face Pull",muscles:["Shoulders","Traps"],equipment:"Cable",notes:""},
  {id:"ex18",name:"Incline Dumbbell Press",muscles:["Chest","Shoulders","Triceps"],equipment:"Dumbbell",notes:""},
  {id:"ex19",name:"Hammer Curl",muscles:["Biceps","Forearms"],equipment:"Dumbbell",notes:""},
  {id:"ex20",name:"Hip Thrust",muscles:["Glutes","Hamstrings"],equipment:"Barbell",notes:""},
];

const SEED_RT=[
  {id:"rt1",name:"Push Day",description:"Chest, shoulders, triceps",color:"#c9453a",exercises:[{exerciseId:"ex1",sets:4,reps:"8-10",restSec:120,notes:"Warm up with bar"},{exerciseId:"ex18",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex13",sets:3,reps:"12-15",restSec:60,notes:"Squeeze at peak"},{exerciseId:"ex4",sets:4,reps:"6-8",restSec:120,notes:""},{exerciseId:"ex11",sets:3,reps:"12-15",restSec:60,notes:""},{exerciseId:"ex8",sets:3,reps:"12-15",restSec:60,notes:""}]},
  {id:"rt2",name:"Pull Day",description:"Back, biceps, rear delts",color:"#3a7a52",exercises:[{exerciseId:"ex3",sets:4,reps:"5",restSec:180,notes:"Focus on form"},{exerciseId:"ex5",sets:4,reps:"8-10",restSec:90,notes:""},{exerciseId:"ex10",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex17",sets:3,reps:"15-20",restSec:60,notes:""},{exerciseId:"ex7",sets:3,reps:"10-12",restSec:60,notes:""},{exerciseId:"ex19",sets:3,reps:"10-12",restSec:60,notes:""}]},
  {id:"rt3",name:"Leg Day",description:"Quads, hamstrings, glutes, calves",color:"#d4a037",exercises:[{exerciseId:"ex2",sets:4,reps:"6-8",restSec:180,notes:"Deep squat"},{exerciseId:"ex9",sets:3,reps:"10-12",restSec:120,notes:""},{exerciseId:"ex12",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex14",sets:3,reps:"12-15",restSec:60,notes:""},{exerciseId:"ex20",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex15",sets:4,reps:"15-20",restSec:60,notes:""}]},
];

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtDate=d=>new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtDateFull=d=>new Date(d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
const fmtTime=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const volDisplay=v=>v>1000?(v/1000).toFixed(1)+'k':v;
const getEx=id=>state.exercises.find(e=>e.id===id)||{name:"Unknown",muscles:[],equipment:""};
const getRt=id=>state.routines.find(r=>r.id===id);

function totalVolume(session){let v=0;(session.logs||[]).forEach(l=>(l.sets||[]).forEach(s=>{if(s.done)v+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0)}));return v}
function getStreak(){if(!state.sessions.length)return 0;const sorted=[...state.sessions].sort((a,b)=>new Date(b.date)-new Date(a.date));let streak=0,check=new Date();check.setHours(0,0,0,0);for(let i=0;i<60;i++){const ds=check.toISOString().slice(0,10);if(sorted.some(s=>s.date&&s.date.startsWith(ds)))streak++;else if(i>0)break;check.setDate(check.getDate()-1)}return streak}

// ═══════════════════════════════════════════════════════════════
// STATE & STORAGE (localStorage)
// ═══════════════════════════════════════════════════════════════
let state={exercises:[],routines:[],sessions:[],profile:{name:"Paul",age:51,weight:"",height:"",experience:"Intermediate"},apiKey:"",activeSession:null,sessionTimer:0,coachMessages:[],coachRoutineId:null};
let timerInterval=null,restInterval=null;

function save(){
  try{localStorage.setItem('apex-data',JSON.stringify({exercises:state.exercises,routines:state.routines,sessions:state.sessions,profile:state.profile,apiKey:state.apiKey}))}catch(e){console.warn('Save error:',e)}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('apex-data'));
    if(d){
      state.exercises=d.exercises?.length?d.exercises:[...SEED_EX];
      state.routines=d.routines?.length?d.routines:JSON.parse(JSON.stringify(SEED_RT));
      state.sessions=d.sessions||[];
      if(d.profile)Object.assign(state.profile,d.profile);
      state.apiKey=d.apiKey||"";
    }else{state.exercises=[...SEED_EX];state.routines=JSON.parse(JSON.stringify(SEED_RT))}
  }catch{state.exercises=[...SEED_EX];state.routines=JSON.parse(JSON.stringify(SEED_RT))}
}

// ═══════════════════════════════════════════════════════════════
// AI ENGINE (Direct Anthropic API with browser header)
// ═══════════════════════════════════════════════════════════════
const IMG_PROMPT=`You are an expert workout routine parser that reads images of workout programs, fitness plans, gym routines, magazine pages, handwritten notes, infographics, and screenshots.

CRITICAL RULES:
1. Read EVERY exercise, set, rep, and detail visible in the image.
2. If the image contains MULTIPLE routines or days (e.g., Monday-Friday, Day 1/Day 2), return ALL of them as separate routines.
3. For timed exercises (e.g., "30 sec plank"), use sets:1 and reps:"30 sec".
4. For cardio intervals (e.g., "Run 2 min, walk 2 min x7"), use sets for cycles and describe in reps/notes.
5. For rep-based exercises (e.g., "20 squats"), use sets:1 and reps:"20".
6. Assign realistic muscle groups. Equipment is "Bodyweight" unless specified.
7. Assign a unique hex color to each routine.

Return ONLY valid JSON, no markdown, no backticks:
For SINGLE routine: {"name":"...","description":"...","color":"#hex","exercises":[{"name":"...","sets":N,"reps":"...","restSec":N,"muscles":["..."],"equipment":"...","notes":"..."}]}
For MULTIPLE routines: {"routines":[{...same structure...}]}`;

const TXT_PROMPT=`You parse workout routines from text into JSON. If multiple routines/days exist, return all.
Return ONLY valid JSON. Single: {"name":"...","description":"...","color":"#hex","exercises":[...]}
Multiple: {"routines":[{...}]}. No markdown, no backticks.`;

async function callAI(system,messages,maxTokens=2000){
  if(!state.apiKey)throw new Error('No API key. Add your Anthropic API key in Config → AI Settings.');
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages})
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(`API ${resp.status}: ${e.error?.message||'error'}`);}
  const data=await resp.json();
  return data.content?.map(c=>c.text||'').join('')||'';
}

function compressImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');let w=img.width,h=img.height;
      if(w>1200){h=(1200/w)*h;w=1200}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      res({b64:c.toDataURL('image/jpeg',.85).split(',')[1],type:'image/jpeg'});
    };
    img.onerror=rej;img.src=URL.createObjectURL(file);
  });
}
function readFileB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();r.onload=()=>{
      const url=r.result;const b64=url.split(',')[1];
      const m=url.match(/^data:(image\/[a-z+]+);/);
      res({b64,type:m?m[1]:(file.type||'image/png')});
    };r.onerror=rej;r.readAsDataURL(file);
  });
}
function parseJSON(text){let t=text.replace(/```json\s*/g,'').replace(/```/g,'').trim();const s=t.indexOf('{'),e=t.lastIndexOf('}');if(s>=0&&e>s)t=t.substring(s,e+1);return JSON.parse(t)}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function switchTab(tab){
  state.currentTab=tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.toggle('active',b.dataset.tab===tab);if(b.dataset.tab==='lift')b.classList.toggle('has-session',!!state.activeSession)});
  render();
}
function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').style.display='flex'}
function closeModal(){document.getElementById('modalOverlay').style.display='none'}

// ═══════════════════════════════════════════════════════════════
// RENDER: DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDash(){
  const streak=getStreak();
  const thisWeek=state.sessions.filter(s=>{const d=new Date(s.date);return(Date.now()-d)/86400000<7});
  const weekVol=thisWeek.reduce((s,x)=>s+totalVolume(x),0);
  const hasKey=!!state.apiKey;

  let h=`<div class="top-bar"><div style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:13px;color:var(--t2);font-weight:500">APEX</div><div class="h1">Dashboard</div></div>
    <div class="api-status ${hasKey?'api-on':'api-off'}">${hasKey?'● AI Ready':'○ No API Key'}</div>
  </div></div>
  <div style="padding:0 16px 20px">
    <div class="stat-grid">
      <div class="card stat-card" style="margin-bottom:0"><div style="font-size:14px">🔥</div><div class="stat-val mono" style="color:${streak?'#e67e22':'var(--t2)'}">${streak}d</div><div class="stat-label">Streak</div></div>
      <div class="card stat-card" style="margin-bottom:0"><div style="font-size:14px">✓</div><div class="stat-val mono" style="color:var(--al)">${thisWeek.length}</div><div class="stat-label">This Week</div></div>
      <div class="card stat-card" style="margin-bottom:0"><div style="font-size:14px">⚡</div><div class="stat-val mono" style="color:var(--w)">${volDisplay(weekVol)}</div><div class="stat-label">Volume</div></div>

function renderLift(){
  const el=document.getElementById('screen-lift');
  if(!state.activeSession){
    let h=`<div class="top-bar"><div class="h1">Lift</div></div><div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">🏋️</div>
      <div class="h2" style="margin-bottom:8px">No Active Session</div>
      <div class="muted" style="margin-bottom:20px">Pick a routine to start lifting.</div>`;
    state.routines.forEach(r=>{h+=`<button class="btn" style="margin-bottom:8px;background:${r.color}" onclick="startSession('${r.id}')">▶ ${esc(r.name)}</button>`});
    h+='</div>';el.innerHTML=h;return;
  }
  const as=state.activeSession,rt=getRt(as.routineId);
  const totalDone=as.logs.reduce((s,l)=>s+l.sets.filter(x=>x.done).length,0);
  const totalSets=as.logs.reduce((s,l)=>s+l.sets.length,0);
  const pct=totalSets?(totalDone/totalSets)*100:0;

  let h=`<div class="top-bar" style="padding-bottom:4px">
    <div class="row" style="justify-content:space-between;width:100%"><div>
      <div style="font-size:11px;color:${rt?.color||'var(--al)'};font-weight:700;text-transform:uppercase;letter-spacing:1px">LIVE SESSION</div>
      <div class="h1">${esc(rt?.name||'Workout')}</div>
    </div><div style="text-align:right">
      <div class="mono" style="font-size:22px;font-weight:800;color:var(--al)">${fmtTime(state.sessionTimer)}</div>
      <button class="btn-sm btn-danger" style="margin-top:4px" onclick="finishSession()">Finish</button>
    </div></div>
    <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%;background:${rt?.color||'var(--al)'}"></div></div>
  </div><div style="padding:8px 16px 20px">`;

  as.logs.forEach((log,exIdx)=>{
    const ex=getEx(log.exerciseId),done=log.sets.filter(s=>s.done).length,allDone=done===log.sets.length;
    h+=`<div class="card-flush" style="${allDone?'opacity:.6':''}">
      <div style="padding:12px 14px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center"><div>
        <div style="font-weight:700;font-size:14px">${esc(ex.name)}</div>
        <div style="font-size:11px;color:var(--t2)">${log.targetSets}×${log.targetReps} · Rest ${log.restSec}s${log.notes?' · '+esc(log.notes):''}</div>
      </div><div class="badge" ${allDone?'style="background:var(--a);color:#fff"':''}>${done}/${log.sets.length}</div></div>
      <div style="padding:0 14px 10px">
        <div class="set-row set-header"><div>Set</div><div>Weight</div><div>Reps</div><div></div></div>`;
    log.sets.forEach((set,sIdx)=>{
      h+=`<div class="set-row">
        <div class="mono" style="font-size:13px;font-weight:700;color:var(--t2)">${sIdx+1}</div>
        <input type="number" inputmode="decimal" value="${set.weight}" placeholder="lbs" style="padding:7px 8px;font-size:13px;text-align:center;${set.done?'background:var(--ad)':''}" onchange="updateSet(${exIdx},${sIdx},'weight',this.value)">
        <input type="number" inputmode="numeric" value="${set.reps}" placeholder="reps" style="padding:7px 8px;font-size:13px;text-align:center;${set.done?'background:var(--ad)':''}" onchange="updateSet(${exIdx},${sIdx},'reps',this.value)">
        <button class="check-btn ${set.done?'done':''}" onclick="toggleSet(${exIdx},${sIdx})">${set.done?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':''}</button>
      </div>`;
    });
    if(!allDone&&done>0)h+=`<button class="btn-sm" style="width:100%;margin-top:6px;text-align:center" onclick="startRest(${log.restSec})">⏱ Start ${log.restSec}s Rest</button>`;
    h+='</div></div>';
  });
  h+=`<button class="btn" style="margin-top:12px" onclick="finishSession()">✓ Finish Session</button></div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS: SESSION
// ═══════════════════════════════════════════════════════════════
function startSession(routineId){
  const rt=getRt(routineId);if(!rt)return;
  state.activeSession={routineId,startTime:Date.now(),logs:rt.exercises.map(re=>({
    exerciseId:re.exerciseId,targetSets:re.sets,targetReps:re.reps,restSec:re.restSec,notes:re.notes,
    sets:Array.from({length:re.sets},()=>({weight:'',reps:'',done:false}))
  }))};
  state.sessionTimer=0;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{state.sessionTimer++;const el=document.querySelector('#screen-lift .mono[style*="font-size:22px"]');if(el)el.textContent=fmtTime(state.sessionTimer)},1000);
  closeModal();switchTab('lift');
}
function updateSet(exIdx,sIdx,field,value){if(!state.activeSession)return;state.activeSession.logs[exIdx].sets[sIdx][field]=value}
function toggleSet(exIdx,sIdx){if(!state.activeSession)return;state.activeSession.logs[exIdx].sets[sIdx].done=!state.activeSession.logs[exIdx].sets[sIdx].done;renderLift()}
function startRest(seconds){
  let left=seconds;
  openModal(`<div style="text-align:center;padding:20px">
    <div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">REST TIMER</div>
    <div id="restDisplay" class="mono" style="font-size:48px;font-weight:800;color:var(--al)">${fmtTime(left)}</div>
    <div class="progress-bar" style="margin:16px 0;height:6px"><div id="restBar" class="progress-fill" style="width:0%;background:var(--al)"></div></div>
    <button class="btn-sm" onclick="clearInterval(restInterval);closeModal()">Skip</button>
  </div>`);
  clearInterval(restInterval);
  restInterval=setInterval(()=>{left--;const d=document.getElementById('restDisplay'),b=document.getElementById('restBar');if(d)d.textContent=fmtTime(Math.max(0,left));if(b)b.style.width=((seconds-left)/seconds*100)+'%';if(left<=0){clearInterval(restInterval);closeModal()}},1000);
}
function finishSession(){
  if(!state.activeSession)return;clearInterval(timerInterval);
  const as=state.activeSession,rt=getRt(as.routineId);
  const completedSets=as.logs.reduce((s,l)=>s+l.sets.filter(x=>x.done).length,0);
  const totalSets=as.logs.reduce((s,l)=>s+l.sets.length,0);
  state.sessions.unshift({id:uid(),routineId:as.routineId,routineName:rt?.name||'Unknown',date:new Date().toISOString(),duration:state.sessionTimer,logs:as.logs,completedSets,totalSets});
  state.activeSession=null;state.sessionTimer=0;save();switchTab('dash');
}

function importSingleRoutine(parsed){
  const exs=(parsed.exercises||[]).map(e=>{
    let exId=state.exercises.find(x=>x.name.toLowerCase()===e.name.toLowerCase())?.id;
    if(!exId){exId=uid();state.exercises.push({id:exId,name:e.name,muscles:e.muscles||[],equipment:e.equipment||'Bodyweight',notes:e.notes||''})}
    return{exerciseId:exId,sets:e.sets||1,reps:String(e.reps||'1'),restSec:e.restSec||60,notes:e.notes||''};
  });
  const newRt={id:uid(),name:parsed.name,description:parsed.description||'',color:parsed.color||'#2d5a3d',exercises:exs};
  state.routines.push(newRt);return newRt.name;
}
function importParsedRoutine(p){importSingleRoutine(p);save();render();alert('✓ Added: '+p.name)}

async function handleImageImport(file){
  if(!file)return;
  const statusEl=document.getElementById('importStatus');
  statusEl.innerHTML=`<div style="text-align:center;margin-top:16px"><div class="loading-dots"><span></span><span></span><span></span></div><div style="color:var(--al);font-weight:700;margin-top:4px">AI is reading your routine...</div></div>`;
  try{
    let imgData;try{imgData=await compressImage(file)}catch{imgData=await readFileB64(file)}
    const text=await callAI(IMG_PROMPT,[{role:'user',content:[{type:'image',source:{type:'base64',media_type:imgData.type,data:imgData.b64}},{type:'text',text:'Parse every workout routine visible. Include ALL days if multiple.'}]}],4000);
    const parsed=parseJSON(text);
    const rts=parsed.routines||( Array.isArray(parsed)?parsed:[parsed]);
    showImportPreview(rts);
  }catch(e){console.error('Import:',e);statusEl.innerHTML=`<div style="text-align:center;margin-top:12px"><div style="color:var(--r);font-weight:700">Import failed</div><div style="font-size:12px;color:var(--t2);margin-top:4px">${esc(e.message)}</div></div>`}
}

async function handleTextImport(){
  const text=document.getElementById('importText')?.value;if(!text?.trim())return;
  const statusEl=document.getElementById('importStatus');
  statusEl.innerHTML='<div class="loading-dots" style="margin-top:12px"><span></span><span></span><span></span></div>';
  try{
    const result=await callAI(TXT_PROMPT,[{role:'user',content:'Parse every routine:\n\n'+text}],4000);
    const parsed=parseJSON(result);
    const rts=parsed.routines||(Array.isArray(parsed)?parsed:[parsed]);
    showImportPreview(rts);
  }catch(e){statusEl.innerHTML=`<div style="color:var(--r);text-align:center;margin-top:12px">${esc(e.message)}</div>`}
}

function showImportPreview(routines){
  window._pendingImport=routines;
  let h=`<div class="row" style="justify-content:space-between;margin-bottom:16px">
    <div class="h1">Preview Import</div><button style="background:none;padding:8px;color:var(--t)" onclick="closeModal()">✕</button></div>
    <div style="font-size:13px;color:var(--al);font-weight:700;margin-bottom:12px">${routines.length} routine${routines.length>1?'s':''} found</div>`;
  routines.forEach((r,i)=>{
    h+=`<div class="card" style="border-left:3px solid ${r.color||'var(--a)'};padding:12px">
      <div class="row" style="justify-content:space-between;margin-bottom:4px">
        <div class="h3" style="color:${r.color||'var(--al)'}">${esc(r.name||'Routine '+(i+1))}</div>
        <span class="badge">${(r.exercises||[]).length} ex</span></div>
      ${r.description?`<div style="font-size:12px;color:var(--t2);margin-bottom:6px">${esc(r.description)}</div>`:''}
      <div style="max-height:150px;overflow-y:auto">`;
    (r.exercises||[]).forEach(e=>{h+=`<div class="ex-pill" style="padding:4px 0"><div style="font-weight:600;font-size:12px">${esc(e.name)}</div><div style="font-size:11px;color:var(--t2)">${e.sets||1}×${e.reps||'?'} · ${esc((e.muscles||[]).join(', '))}</div></div>`});
    h+='</div></div>';
  });
  h+=`<div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn" style="flex:1" onclick="confirmMultiImport()">Add ${routines.length} Routine${routines.length>1?'s':''}</button>
    <button class="btn" style="flex:1;background:var(--c2);color:var(--t)" onclick="openImportModal()">Re-scan</button></div>`;
  openModal(h);
}

function confirmMultiImport(){
  if(!window._pendingImport)return;
  const names=window._pendingImport.map(r=>importSingleRoutine(r));
  window._pendingImport=null;save();closeModal();render();
  alert('✓ Added: '+names.join(', '));
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS: COACH
// ═══════════════════════════════════════════════════════════════
window._coachLoading=false;
async function sendCoachMsg(preset){
  const input=document.getElementById('coachInput');
  const msg=preset||(input?input.value:'');if(!msg?.trim())return;
  state.coachMessages.push({role:'user',content:msg,display:msg});
  if(input)input.value='';window._coachLoading=true;renderCoach();
  try{
    let ctx=`User: ${state.profile.name}, ${state.profile.age}yo, ${state.profile.experience} lifter.\n`;
    ctx+=`Routines: ${state.routines.map(r=>r.name+' ('+r.exercises.map(e=>getEx(e.exerciseId).name).join(', ')+')').join(' | ')}\n`;
    if(state.coachRoutineId){const rt=getRt(state.coachRoutineId);if(rt){ctx+=`\nCOACHING: "${rt.name}"\n`;rt.exercises.forEach((e,i)=>{const ex=getEx(e.exerciseId);ctx+=`${i+1}. ${ex.name} ${e.sets}x${e.reps} rest ${e.restSec}s\n`})}}
    const recent=state.sessions.slice(0,5).map(s=>`${s.routineName} ${fmtDate(s.date)}: ${s.completedSets}/${s.totalSets} sets`).join('\n');
    if(recent)ctx+=`\nRecent:\n${recent}`;
    const text=await callAI(`You are APEX Coach, expert AI strength coach. Coach on FULL ROUTINES. Be direct. When creating routines, include JSON in \`\`\`json...\`\`\`: {"name":...,"description":...,"color":"#hex","exercises":[{"name":...,"sets":N,"reps":"...","restSec":N,"muscles":[...],"equipment":"...","notes":"..."}]}\n\nContext:\n${ctx}`,state.coachMessages.map(m=>({role:m.role,content:m.content})));
    const jsonMatch=text.match(/```json\s*([\s\S]*?)```/);let parsed=null;
    if(jsonMatch){try{parsed=JSON.parse(jsonMatch[1])}catch{}}
    const display=text.replace(/```json[\s\S]*?```/g,parsed?'[See routine below]':'');
    state.coachMessages.push({role:'assistant',content:text,display,parsed});
  }catch(e){state.coachMessages.push({role:'assistant',content:'Error',display:'Error: '+e.message})}
  window._coachLoading=false;renderCoach();
}

// ═══════════════════════════════════════════════════════════════
// MODALS: VIEW / EDIT ROUTINE
// ═══════════════════════════════════════════════════════════════
function openViewRoutine(id){
  const r=getRt(id);if(!r)return;
  const muscles=[...new Set(r.exercises.flatMap(e=>getEx(e.exerciseId).muscles))];
  let h=`<div class="row" style="justify-content:space-between;margin-bottom:12px"><div>
    <div class="h1" style="color:${r.color}">${esc(r.name)}</div><div class="muted">${esc(r.description)}</div>
  </div><button style="background:none;padding:8px;color:var(--t)" onclick="closeModal()">✕</button></div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">${muscles.map(m=>`<span class="badge">${esc(m)}</span>`).join('')}</div>`;
  r.exercises.forEach(re=>{const ex=getEx(re.exerciseId);
    h+=`<div class="card" style="padding:10px"><div class="row" style="justify-content:space-between"><div>
      <div style="font-weight:700;font-size:13px">${esc(ex.name)}</div><div style="font-size:11px;color:var(--t2)">${esc(ex.equipment)} · ${esc(ex.muscles.join(', '))}</div>
    </div><div style="text-align:right"><div class="mono" style="font-weight:700;font-size:13px">${re.sets}×${re.reps}</div><div style="font-size:11px;color:var(--t2)">Rest ${re.restSec}s</div></div></div>
    ${re.notes?`<div style="font-size:11px;color:var(--w);margin-top:4px">${esc(re.notes)}</div>`:''}</div>`;
  });
  h+=`<div style="display:flex;gap:8px;margin-top:16px">
    <button class="btn" style="flex:2;background:${r.color}" onclick="startSession('${r.id}')">▶ Start</button>
    <button class="btn" style="flex:1;background:var(--c2);color:var(--t)" onclick="openEditRoutine('${r.id}')">Edit</button>
    <button class="btn" style="flex:1;background:var(--c2);color:var(--t)" onclick="closeModal();state.coachRoutineId='${r.id}';state.coachMessages=[];switchTab('coach')">Coach</button>
  </div><button class="btn" style="margin-top:8px;background:transparent;color:var(--r);font-size:12px" onclick="deleteRoutine('${r.id}')">Delete Routine</button>`;
  openModal(h);
}

let editorState={exercises:[],name:'',desc:'',color:'#2d5a3d',editId:null};
function openEditRoutine(id){
  if(id){const r=getRt(id);if(!r)return;editorState={exercises:[...r.exercises],name:r.name,desc:r.description,color:r.color,editId:r.id}}
  else editorState={exercises:[],name:'',desc:'',color:'#2d5a3d',editId:null};
  renderEditor();
}
function renderEditor(){
  let h=`<div class="row" style="justify-content:space-between;margin-bottom:16px">
    <div class="h1">${editorState.editId?'Edit':'New'} Routine</div><button style="background:none;padding:8px;color:var(--t)" onclick="closeModal()">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><div class="label">Name</div><input id="rtName" value="${esc(editorState.name)}" placeholder="e.g. Push Day" oninput="editorState.name=this.value"></div>
      <div><div class="label">Description</div><input id="rtDesc" value="${esc(editorState.desc)}" oninput="editorState.desc=this.value"></div>
      <div><div class="label">Color</div><div style="display:flex;gap:6px">${COLORS.map(c=>`<div class="color-dot ${editorState.color===c?'sel':''}" style="background:${c}" onclick="editorState.color='${c}';renderEditor()"></div>`).join('')}</div></div>
    </div><div class="divider"></div>
    <div class="row" style="justify-content:space-between;margin-bottom:8px"><div class="h2">Exercises (${editorState.exercises.length})</div></div>`;
  editorState.exercises.forEach((re,i)=>{const ex=getEx(re.exerciseId);
    h+=`<div class="card" style="padding:10px"><div class="row" style="justify-content:space-between;margin-bottom:6px">
      <div style="font-weight:700;font-size:13px">${esc(ex.name)}</div>
      <button style="background:none;color:var(--r);font-size:18px;padding:4px;border:none;cursor:pointer" onclick="editorState.exercises.splice(${i},1);renderEditor()">×</button></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        <div><div style="font-size:10px;color:var(--t2)">Sets</div><input type="number" value="${re.sets}" style="padding:6px 8px;font-size:12px" onchange="editorState.exercises[${i}].sets=parseInt(this.value)||0"></div>
        <div><div style="font-size:10px;color:var(--t2)">Reps</div><input value="${re.reps}" style="padding:6px 8px;font-size:12px" onchange="editorState.exercises[${i}].reps=this.value"></div>
        <div><div style="font-size:10px;color:var(--t2)">Rest</div><input type="number" value="${re.restSec}" style="padding:6px 8px;font-size:12px" onchange="editorState.exercises[${i}].restSec=parseInt(this.value)||0"></div>
      </div></div>`;
  });
  h+=`<div class="card" style="padding:10px;margin-top:4px"><div style="font-size:12px;color:var(--t2);margin-bottom:4px">Add exercise:</div>`;
  state.exercises.slice(0,12).forEach(ex=>{
    h+=`<div class="ex-pill" style="cursor:pointer;font-size:12px" onclick="editorState.exercises.push({exerciseId:'${ex.id}',sets:3,reps:'10',restSec:90,notes:''});renderEditor()"><span style="font-weight:600">${esc(ex.name)}</span> <span style="color:var(--t2)">· ${esc(ex.muscles.join(', '))}</span></div>`;
  });
  h+=`</div><button class="btn" style="margin-top:16px" onclick="saveRoutine()" ${!editorState.name.trim()||!editorState.exercises.length?'disabled':''}>${editorState.editId?'Save':'Create Routine'}</button>`;
  openModal(h);
}
function saveRoutine(){
  const rt={id:editorState.editId||uid(),name:editorState.name.trim(),description:editorState.desc.trim(),color:editorState.color,exercises:editorState.exercises};
  if(editorState.editId)state.routines=state.routines.map(r=>r.id===rt.id?rt:r);else state.routines.push(rt);
  save();closeModal();render();
}
function deleteRoutine(id){if(confirm('Delete?')){state.routines=state.routines.filter(r=>r.id!==id);save();closeModal();render()}}

function openAddExercise(){
  openModal(`<div class="row" style="justify-content:space-between;margin-bottom:16px">
    <div class="h1">Add Exercise</div><button style="background:none;padding:8px;color:var(--t)" onclick="closeModal()">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><div class="label">Name</div><input id="newExName" placeholder="Exercise name"></div>
      <div><div class="label">Muscles</div><div id="muscleSelect" style="display:flex;flex-wrap:wrap;gap:4px">${MUSCLES.map(m=>`<button class="btn-sm" data-m="${m}" onclick="this.classList.toggle('sel');this.style.background=this.classList.contains('sel')?'var(--a)':'';this.style.color=this.classList.contains('sel')?'#fff':''">${m}</button>`).join('')}</div></div>
      <div><div class="label">Equipment</div><select id="newExEquip">${EQUIP.map(e=>`<option>${e}</option>`).join('')}</select></div>
    </div><button class="btn" style="margin-top:16px" onclick="saveNewExercise()">Add Exercise</button>`);
}
function saveNewExercise(){
  const name=document.getElementById('newExName')?.value;if(!name?.trim())return;
  const muscles=[...document.querySelectorAll('#muscleSelect .sel')].map(b=>b.dataset.m);
  state.exercises.push({id:uid(),name:name.trim(),muscles,equipment:document.getElementById('newExEquip')?.value||'Bodyweight',notes:''});
  save();closeModal();renderConfig();
}

// ═══════════════════════════════════════════════════════════════
// DATA MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function exportData(){
  const d=JSON.stringify({exercises:state.exercises,routines:state.routines,sessions:state.sessions,profile:state.profile},null,2);
  const b=new Blob([d],{type:'application/json'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=`apex-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);
}
function importDataFile(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const t=await f.text();const d=JSON.parse(t);
    if(d.exercises)state.exercises=d.exercises;if(d.routines)state.routines=d.routines;
    if(d.sessions)state.sessions=d.sessions;if(d.profile)Object.assign(state.profile,d.profile);
    save();render();alert('Data imported!')}catch{alert('Invalid file.')}};i.click();
}
function resetData(){
  if(!confirm('Reset ALL data?'))return;
  state.exercises=[...SEED_EX];state.routines=JSON.parse(JSON.stringify(SEED_RT));state.sessions=[];
  state.profile={name:'Paul',age:51,weight:'',height:'',experience:'Intermediate'};save();render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════════
function render(){renderDash();renderLift();renderLog();renderCoach();renderConfig();
  document.querySelectorAll('.tab-btn').forEach(b=>{if(b.dataset.tab==='lift')b.classList.toggle('has-session',!!state.activeSession)})}

// INIT
// ═══════════════════════════════════════════════════════════════
load();render();
</script>
