<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APEX">
<meta name="theme-color" content="#2d5a3d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>APEX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--a:#2d5a3d;--al:#3a7a52;--ad:rgba(45,90,61,.15);--bg:#0e1117;--c1:#161b22;--c2:#1c2333;--b:#252d3a;--t:#e6edf3;--t2:#8b949e;--r:#c9453a;--w:#d4a037}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',system-ui,sans-serif}
input,select,textarea{font-family:inherit;outline:none;background:var(--c2);border:1px solid var(--b);border-radius:8px;padding:10px 12px;color:var(--t);font-size:14px;width:100%;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:var(--al)}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative}
.screen{flex:1;overflow-y:auto;padding-bottom:8px;display:none}.screen.active{display:block}
.tab-bar{display:flex;border-top:1px solid var(--b);background:#0d1015;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));flex-shrink:0;z-index:50}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;background:none;color:var(--t2);font-size:10px;font-weight:500;transition:color .2s;position:relative}
.tab-btn.active{color:var(--al);font-weight:700}
.tab-btn .dot{width:6px;height:6px;border-radius:3px;background:var(--r);position:absolute;top:2px;right:calc(50% - 14px);display:none}
.tab-btn.has-session .dot{display:block}
.top-bar{padding:16px 16px 8px;position:sticky;top:0;background:var(--bg);z-index:20}
.card{background:var(--c1);border-radius:12px;padding:16px;border:1px solid var(--b);margin-bottom:8px}
.card-flush{background:var(--c1);border-radius:12px;border:1px solid var(--b);overflow:hidden;margin-bottom:10px}
.btn{background:var(--a);color:#fff;border-radius:10px;padding:12px 20px;font-weight:700;font-size:14px;width:100%;transition:opacity .2s}
.btn:disabled{opacity:.4}
.btn-sm{background:var(--ad);color:var(--al);border-radius:8px;padding:8px 14px;font-weight:600;font-size:12px}
.btn-danger{background:rgba(201,69,58,.13);color:var(--r)}
.badge{background:var(--ad);color:var(--al);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
.label{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.h2{font-size:17px;font-weight:700}
.h3{font-size:14px;font-weight:700}
.mono{font-family:'JetBrains Mono',monospace}
.row{display:flex;align-items:center;gap:10px}
.divider{height:1px;background:var(--b);margin:12px 0}
.muted{color:var(--t2);font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-inner{background:var(--c1);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;animation:slideUp .25s ease-out}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{text-align:center;padding:12px}.stat-val{font-size:22px;font-weight:800;margin-top:4px}.stat-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.routine-card{cursor:pointer;border-left:3px solid var(--a)}.routine-card:active{opacity:.8}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 44px;gap:6px;align-items:center;padding:3px 0}
.set-header{font-size:10px;color:var(--t2);font-weight:600;text-transform:uppercase;padding:8px 0 4px}
.check-btn{width:36px;height:36px;border-radius:8px;border:2px solid var(--b);background:transparent;display:flex;align-items:center;justify-content:center}
.check-btn.done{border-color:var(--al);background:var(--a)}
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap}
.chat-user{background:var(--a);border-bottom-right-radius:4px}
.chat-assistant{background:var(--c2);border-bottom-left-radius:4px}
.import-zone{text-align:center;cursor:pointer;padding:24px;border:1px dashed var(--a);background:var(--ad);border-radius:12px}
.color-dot{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.color-dot.sel{border-color:#fff}
.ex-pill{padding:6px 0;border-bottom:1px solid var(--b)}.ex-pill:last-child{border-bottom:none}
.progress-bar{height:3px;background:var(--b);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.loading-dots{display:flex;justify-content:center;gap:4px;padding:12px}
.loading-dots span{width:8px;height:8px;border-radius:4px;background:var(--al)}
.loading-dots span:nth-child(1){animation:pulse 1s ease-in-out 0s infinite}
.loading-dots span:nth-child(2){animation:pulse 1s ease-in-out .15s infinite}
.loading-dots span:nth-child(3){animation:pulse 1s ease-in-out .3s infinite}
.api-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:6px}
.api-on{background:var(--ad);color:var(--al)}.api-off{background:rgba(201,69,58,.1);color:var(--r)}

/* ─── LIVE SESSION v2 STYLES ──────────────────────────────────── */
.ls-card{background:var(--c1);border:1px solid var(--b);border-radius:14px;margin-bottom:10px;overflow:visible}
.ls-card-head{padding:14px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.ls-ex-name{font-size:16px;font-weight:700;cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.12)}
.ls-ex-name:hover{color:var(--al)}
.ls-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:5px}
.ls-type-badge{font-size:10px;font-weight:700;letter-spacing:.8px;padding:2px 7px;border-radius:5px;font-family:'JetBrains Mono',monospace}
.ls-rest-badge{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.ls-add-rest{font-size:11px;color:var(--al);cursor:pointer;font-weight:600;font-family:'JetBrains Mono',monospace}
.ls-pill{display:flex;align-items:baseline;gap:2px;padding:3px 8px;background:var(--ad);border-radius:8px;flex-shrink:0}
.ls-pill-n{font-size:17px;font-weight:700;color:var(--al);font-family:'JetBrains Mono',monospace}
.ls-pill-s{font-size:13px;color:rgba(255,255,255,.2);font-family:'JetBrains Mono',monospace}
.ls-pill-d{font-size:13px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}
.ls-sets{padding:0 10px 10px}
.ls-set-hdr{display:flex;gap:10px;padding:0 8px 5px;align-items:center}
.ls-set-hdr span{font-size:10px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.25);font-family:'JetBrains Mono',monospace}
.ls-srow-wrap{position:relative;border-radius:8px;margin-bottom:3px;overflow:hidden}
.ls-srow{display:flex;gap:10px;padding:7px 8px;align-items:center;border-radius:8px;background:rgba(255,255,255,.02);position:relative;z-index:2;transition:transform .2s ease}
.ls-srow.done{opacity:.4}
.ls-snum{width:24px;font-size:13px;font-weight:600;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace;text-align:center;flex-shrink:0}
.ls-sinput{display:block;width:100%;padding:7px 10px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-size:13px;font-family:'JetBrains Mono',monospace;text-align:center;cursor:pointer}
.ls-sinput:focus{background:rgba(45,90,60,.3);border-color:var(--al);color:var(--t);cursor:text}
.ls-check{width:36px;height:36px;border-radius:8px;border:2px solid rgba(255,255,255,.1);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;cursor:pointer}
.ls-check.done{border-color:var(--al);background:rgba(45,90,61,.3);color:var(--al);font-weight:700}
.ls-swipe-bg{position:absolute;inset:0;display:flex;pointer-events:none;border-radius:8px}
.ls-add-set{width:100%;padding:9px;border-radius:8px;background:transparent;border:1px dashed rgba(255,255,255,.08);color:rgba(255,255,255,.25);font-size:11px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;margin-top:3px}
.ls-lp-menu{display:flex;background:rgba(20,25,35,.97);border:1px solid rgba(255,255,255,.1);border-radius:9px;overflow:hidden;margin-top:3px;animation:slideDown .15s ease}
.ls-lp-btn{flex:1;padding:9px 10px;background:transparent;border:none;color:var(--t);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.ls-round{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;transition:all .2s ease}
.ls-round-cycle{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);font-family:'JetBrains Mono',monospace;width:24px;flex-shrink:0}
.ls-big-start{width:100%;padding:13px;border-radius:10px;background:var(--ad);border:1px solid rgba(45,90,61,.3);color:var(--al);font-size:15px;font-weight:600;cursor:pointer}
.ls-apply-toast{margin:0 0 8px;padding:9px 14px;background:var(--ad);border:1px solid rgba(45,90,61,.3);border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--t);animation:slideDown .25s ease;font-size:13px}
.ls-rest-bar{position:sticky;top:0;z-index:30;padding:0 0 8px}
.ls-rest-inner{background:var(--ad);border:1px solid rgba(45,90,61,.3);border-radius:14px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.ls-notes{font-size:12px;color:var(--t2);margin-top:5px;cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.08);display:inline-block}
</style>
</head>
<body>

</div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal()"><div class="modal-inner" id="modalContent" onclick="event.stopPropagation()"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════════
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

// ═══════════════════════════════════════════════════════════════
// CONSTANTS & SEED DATA
// ═══════════════════════════════════════════════════════════════
const COLORS=["#c9453a","#3a7a52","#d4a037","#3a6b9f","#8b5cf6","#e67e22","#16a085","#c0392b"];
const MUSCLES=["Chest","Back","Shoulders","Biceps","Triceps","Quads","Hamstrings","Glutes","Calves","Core","Forearms","Traps"];
const EQUIP=["Barbell","Dumbbell","Cable","Machine","Bodyweight","Kettlebell","Band","Smith Machine","EZ Bar","Trap Bar"];

const SEED_EX=[
  {id:"ex1",name:"Barbell Bench Press",muscles:["Chest","Triceps","Shoulders"],equipment:"Barbell",notes:""},
  {id:"ex2",name:"Barbell Squat",muscles:["Quads","Glutes","Core"],equipment:"Barbell",notes:""},
  {id:"ex3",name:"Barbell Deadlift",muscles:["Back","Hamstrings","Glutes","Core"],equipment:"Barbell",notes:""},
  {id:"ex4",name:"Overhead Press",muscles:["Shoulders","Triceps"],equipment:"Barbell",notes:""},
  {id:"ex5",name:"Barbell Row",muscles:["Back","Biceps"],equipment:"Barbell",notes:""},
  {id:"ex6",name:"Pull-ups",muscles:["Back","Biceps"],equipment:"Bodyweight",notes:""},
  {id:"ex7",name:"Dumbbell Curl",muscles:["Biceps"],equipment:"Dumbbell",notes:""},
  {id:"ex8",name:"Tricep Pushdown",muscles:["Triceps"],equipment:"Cable",notes:""},
  {id:"ex9",name:"Leg Press",muscles:["Quads","Glutes"],equipment:"Machine",notes:""},
  {id:"ex10",name:"Lat Pulldown",muscles:["Back","Biceps"],equipment:"Cable",notes:""},
  {id:"ex11",name:"Dumbbell Lateral Raise",muscles:["Shoulders"],equipment:"Dumbbell",notes:""},
  {id:"ex12",name:"Romanian Deadlift",muscles:["Hamstrings","Glutes","Back"],equipment:"Barbell",notes:""},
  {id:"ex13",name:"Cable Fly",muscles:["Chest"],equipment:"Cable",notes:""},
  {id:"ex14",name:"Leg Curl",muscles:["Hamstrings"],equipment:"Machine",notes:""},
  {id:"ex15",name:"Calf Raise",muscles:["Calves"],equipment:"Machine",notes:""},
  {id:"ex16",name:"Plank",muscles:["Core"],equipment:"Bodyweight",notes:""},
  {id:"ex17",name:"Face Pull",muscles:["Shoulders","Traps"],equipment:"Cable",notes:""},
  {id:"ex18",name:"Incline Dumbbell Press",muscles:["Chest","Shoulders","Triceps"],equipment:"Dumbbell",notes:""},
  {id:"ex19",name:"Hammer Curl",muscles:["Biceps","Forearms"],equipment:"Dumbbell",notes:""},
  {id:"ex20",name:"Hip Thrust",muscles:["Glutes","Hamstrings"],equipment:"Barbell",notes:""},
];

const SEED_RT=[
  {id:"rt1",name:"Push Day",description:"Chest, shoulders, triceps",color:"#c9453a",exercises:[{exerciseId:"ex1",sets:4,reps:"8-10",restSec:120,notes:"Warm up with bar"},{exerciseId:"ex18",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex13",sets:3,reps:"12-15",restSec:60,notes:"Squeeze at peak"},{exerciseId:"ex4",sets:4,reps:"6-8",restSec:120,notes:""},{exerciseId:"ex11",sets:3,reps:"12-15",restSec:60,notes:""},{exerciseId:"ex8",sets:3,reps:"12-15",restSec:60,notes:""}]},
  {id:"rt2",name:"Pull Day",description:"Back, biceps, rear delts",color:"#3a7a52",exercises:[{exerciseId:"ex3",sets:4,reps:"5",restSec:180,notes:"Focus on form"},{exerciseId:"ex5",sets:4,reps:"8-10",restSec:90,notes:""},{exerciseId:"ex10",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex17",sets:3,reps:"15-20",restSec:60,notes:""},{exerciseId:"ex7",sets:3,reps:"10-12",restSec:60,notes:""},{exerciseId:"ex19",sets:3,reps:"10-12",restSec:60,notes:""}]},
  {id:"rt3",name:"Leg Day",description:"Quads, hamstrings, glutes, calves",color:"#d4a037",exercises:[{exerciseId:"ex2",sets:4,reps:"6-8",restSec:180,notes:"Deep squat"},{exerciseId:"ex9",sets:3,reps:"10-12",restSec:120,notes:""},{exerciseId:"ex12",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex14",sets:3,reps:"12-15",restSec:60,notes:""},{exerciseId:"ex20",sets:3,reps:"10-12",restSec:90,notes:""},{exerciseId:"ex15",sets:4,reps:"15-20",restSec:60,notes:""}]},
];

// ═══════════════════════════════════════════════════════════════
// EXERCISE TYPE DETECTION
// ═══════════════════════════════════════════════════════════════
const BW_SET=new Set([
  "squats","squat","lunges","lunge","push-ups","pushups","push ups","pull-ups","pullups","pull ups",
  "burpees","burpee","plank","planks","jumping jacks","jumping jack","mountain climbers","mountain climber",
  "butt kicks","butt kick","high knees","high knee","crunches","crunch","sit-ups","situps","sit ups",
  "dips","dip","leg raises","leg raise","flutter kicks","flutter kick","bicycle crunches",
  "wall sit","wall sits","box jumps","box jump","step ups","step-ups","calf raises","calf raise",
  "glute bridges","glute bridge","hip thrusts","hip thrust","superman","dead bugs","dead bug",
  "bear crawl","bear crawls","inchworm","inchworms","star jumps","star jump",
  "donkey kicks","donkey kick","fire hydrants","fire hydrant","side lunges","side lunge",
  "reverse lunges","reverse lunge","curtsy lunges","curtsy lunge","pistol squats","pistol squat",
  "jump squats","jump squat","sumo squats","sumo squat","air squats","air squat",
  "split squats","split squat","bulgarian split squats","bulgarian split squat"
]);
const TIMED_KW=["run","walk","jog","sprint","bike","cycle","swim","row","hold","plank","wall sit","rest","stretching","stretch"];
const DUR_RE=/(\d+)\s*(min|mins|minute|minutes|sec|secs|second|seconds)/i;

function detectType(log){
  const name=(log.name||'').toLowerCase().trim();
  const notes=(log.notes||'').toLowerCase();
  const combo=name+' '+notes;
  const reps=(log.targetReps||'').toString().toLowerCase();
  if(/run.*walk|walk.*run|interval/i.test(combo)||(DUR_RE.test(combo)&&TIMED_KW.some(k=>combo.includes(k))))return 'timed';
  if(DUR_RE.test(reps)||DUR_RE.test(combo)){
    const ex=getEx(log.exerciseId);
    if(ex.equipment==='Bodyweight'||!log.sets||log.sets.some(s=>!s.weight&&s.weight!==0))return 'duration';
  }
  if(BW_SET.has(name)||BW_SET.has(name.replace(/s$/,''))){
    const ex=getEx(log.exerciseId);
    if(ex.equipment==='Bodyweight')return 'bodyweight';
  }
  return 'weighted';
}

function parseTimedRounds(log){
  const combo=`${log.name} ${log.notes||''}`;
  const segs=combo.match(/(\w+)\s+(\d+)\s*(min|mins|sec|secs)/gi);
  if(!segs)return null;
  const base=[];
  segs.forEach(seg=>{const m=seg.match(/(\w+)\s+(\d+)\s*(min|mins|sec|secs)/i);
    if(m)base.push({action:m[1].charAt(0).toUpperCase()+m[1].slice(1).toLowerCase(),duration:parseInt(m[2]),unit:m[3].replace(/s$/,'')});
  });
  const cycles=log.targetSets||4;
  const out=[];
  for(let c=0;c<cycles;c++)base.forEach((r,i)=>out.push({...r,id:`${c}-${i}`,cycle:c+1}));
  return out.length?out:null;
}

function parseDuration(log){
  const reps=(log.targetReps||'').toString();
  const m=reps.match(/(\d+)\s*(min|mins|sec|secs|second|seconds|minute|minutes)?/i);
  if(m){const v=parseInt(m[1]);const u=(m[2]||'').toLowerCase();return(u.startsWith('min'))?v*60:v;}
  const m2=(log.name+' '+(log.notes||'')).match(/(\d+)\s*(sec|secs|min|mins)/i);
  if(m2){const v=parseInt(m2[1]);return m2[2].startsWith('min')?v*60:v;}
  return 60;
}

function getStreak(){if(!state.sessions.length)return 0;const sorted=[...state.sessions].sort((a,b)=>new Date(b.date)-new Date(a.date));let streak=0,check=new Date();check.setHours(0,0,0,0);for(let i=0;i<60;i++){const ds=check.toISOString().slice(0,10);if(sorted.some(s=>s.date&&s.date.startsWith(ds)))streak++;else if(i>0)break;check.setDate(check.getDate()-1)}return streak}

async function callAI(system,messages,maxTokens=2000){
  if(!state.apiKey)throw new Error('No API key. Add your Anthropic API key in Config → AI Settings.');
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages})
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(`API ${resp.status}: ${e.error?.message||'error'}`);}
  const data=await resp.json();
  return data.content?.map(c=>c.text||'').join('')||'';
}

function compressImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>1200){h=(1200/w)*h;w=1200}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res({b64:c.toDataURL('image/jpeg',.85).split(',')[1],type:'image/jpeg'});};
    img.onerror=rej;img.src=URL.createObjectURL(file);
  });
}
function readFileB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();r.onload=()=>{const url=r.result;const b64=url.split(',')[1];const m=url.match(/^data:(image\/[a-z+]+);/);res({b64,type:m?m[1]:(file.type||'image/png')});};r.onerror=rej;r.readAsDataURL(file);
  });
}
function parseJSON(text){let t=text.replace(/```json\s*/g,'').replace(/```/g,'').trim();const s=t.indexOf('{'),e=t.lastIndexOf('}');if(s>=0&&e>s)t=t.substring(s,e+1);return JSON.parse(t)}

function getSetVal(exIdx,sIdx,field){
  const key=`${exIdx}-${sIdx}`;
  if(ls.overrides[key]?.[field]!==undefined)return ls.overrides[key][field];
  const log=state.activeSession?.logs[exIdx];
  if(!log)return '';
  if(field==='weight')return log.sets[sIdx]?.weight||'';
  if(field==='reps'){
    if(log.sets[sIdx]?.reps)return log.sets[sIdx].reps;
    const r=log.targetReps||'';
    const m=r.match(/^(\d+)/);return m?m[1]:r;
  }
  return '';
}

  if(isEdName)h+=`<input autofocus class="ls-ex-name" value="${esc(ls.editVal)}" style="background:rgba(45,90,60,.3);border:1px solid var(--al);border-radius:6px;padding:4px 8px;color:var(--t);font-size:16px;font-weight:700;width:100%" onblur="lsSaveEdit()" onkeydown="if(event.key==='Enter')lsSaveEdit();if(event.key==='Escape')lsCancelEdit()">`;
  else h+=`<span class="ls-ex-name" onclick="lsStartEdit('${exIdx}:name','${esc(log.name)}')">${esc(log.name)}</span>`;
  h+=`<div class="ls-meta"><span class="ls-type-badge" style="background:var(--ad);color:var(--al)">⏱ TIMED</span>`;
  if(log.restSec>0)h+=`<span class="ls-rest-badge">Rest ${log.restSec}s</span>`;
  else h+=`<span class="ls-add-rest" onclick="lsShowAddRest(${exIdx})">+ Rest</span>`;
  h+=`</div>`;
  if(log.notes){
    const isEdN=ls.editField===`${exIdx}:notes`;
    if(isEdN)h+=`<input autofocus value="${esc(ls.editVal)}" style="margin-top:5px;font-size:12px;padding:4px 8px;background:rgba(45,90,60,.3);border:1px solid var(--al);border-radius:6px;color:var(--t);width:100%" onblur="lsSaveEdit()" onkeydown="if(event.key==='Enter')lsSaveEdit();if(event.key==='Escape')lsCancelEdit()">`;
    else h+=`<span class="ls-notes" onclick="lsStartEdit('${exIdx}:notes','${esc(log.notes)}')">${esc(log.notes)}</span>`;
  }
  h+=`</div><div class="ls-pill"><span class="ls-pill-n">${done}</span><span class="ls-pill-s">/</span><span class="ls-pill-d">${rounds.length}</span></div></div>`;

  h+=`<div style="padding:0 8px 8px;display:flex;flex-direction:column;gap:3px">`;
  rounds.forEach((round,rIdx)=>{
    const key=`${exIdx}-${round.id}`;
    const isDone=ls.completedRounds[key];
    const isActive=ls.timedActive===key;
    const sec=round.unit==='min'?round.duration*60:round.duration;
    const isEdRound=ls.editField===`${exIdx}:round:${rIdx}`;

    h+=`<div class="ls-round" style="background:${isDone?'rgba(45,90,60,.3)':isActive?'rgba(74,124,89,.2)':'rgba(255,255,255,.03)'};border-left:3px solid ${isActive?'var(--al)':'transparent'}">
      <div class="ls-round-cycle">R${round.cycle}</div>`;

    if(isEdRound){
      h+=`<div style="flex:1;display:flex;gap:6px;align-items:center">
        <input autofocus id="rdAct" value="${esc(ls.editVal)}" placeholder="Action" style="flex:2;padding:5px 8px;font-size:13px;background:rgba(45,90,60,.3);border:1px solid var(--al);border-radius:6px;color:var(--t)" onkeydown="if(event.key==='Enter')lsSaveRound(${exIdx},${rIdx});if(event.key==='Escape')lsCancelEdit()">
        <input id="rdDur" type="number" value="${round.duration}" placeholder="#" style="width:50px;padding:5px 8px;font-size:13px;text-align:center;background:rgba(45,90,60,.3);border:1px solid var(--al);border-radius:6px;color:var(--t)" onkeydown="if(event.key==='Enter')lsSaveRound(${exIdx},${rIdx});if(event.key==='Escape')lsCancelEdit()">
        <select id="rdUnit" style="width:55px;padding:5px 4px;font-size:12px;background:rgba(45,90,60,.3);border:1px solid var(--al);border-radius:6px;color:var(--t)"><option value="min" ${round.unit==='min'?'selected':''}>min</option><option value="sec" ${round.unit==='sec'?'selected':''}>sec</option></select>
        <button style="width:28px;height:28px;border-radius:6px;background:var(--a);border:none;color:#fff;font-size:12px;cursor:pointer;flex-shrink:0" onclick="lsSaveRound(${exIdx},${rIdx})">✓</button>
      </div>`;
    }else{
      h+=`<div style="flex:1;cursor:pointer" onclick="lsStartRoundEdit(${exIdx},${rIdx},'${esc(round.action)}')"><span style="color:${isDone?'rgba(255,255,255,.4)':'var(--t)'};text-decoration:${isDone?'line-through':'none'};font-weight:500;font-size:14px">${esc(round.action)} ${round.duration} ${round.unit}</span></div>`;
    }

    if(!isEdRound){
      if(isActive&&ls.timedRunning){
        h+=`<span class="mono" style="color:var(--al);font-weight:700;font-size:16px" id="lsTimedDisp">${fmtTimer(ls.timedSec)}</span>
          <button style="width:30px;height:30px;border-radius:8px;background:var(--a);border:none;color:#fff;font-weight:700;font-size:13px;cursor:pointer" onclick="lsFinishTimedRound(${exIdx},'${round.id}')">✓</button>`;
      }else if(!isDone){
        h+=`<button style="width:30px;height:30px;border-radius:8px;background:var(--ad);border:1px solid rgba(45,90,61,.4);color:var(--al);font-size:11px;cursor:pointer" onclick="lsStartTimed('${key}',${sec})">▶</button>
          <button class="ls-check" onclick="lsToggleRound(${exIdx},'${round.id}')"></button>
          <button style="width:24px;height:24px;border-radius:6px;background:transparent;border:1px solid rgba(201,69,58,.3);color:var(--r);font-size:12px;cursor:pointer;flex-shrink:0" onclick="lsDeleteRound(${exIdx},${rIdx})">×</button>`;
      }else{
        h+=`<div style="width:30px;height:30px;border-radius:8px;background:rgba(74,124,89,.3);display:flex;align-items:center;justify-content:center;color:var(--al);font-weight:700;font-size:13px">✓</div>`;
      }
    }
    h+=`</div>`;
  });
  h+=`<button class="ls-add-set" onclick="lsAddRound(${exIdx})">+ Add Round</button>`;
  h+=`</div></div>`;
  return h;
}

function renderDurationCard(log,exIdx){
  const isDone=log.sets[0]?.done;
  const sec=parseDuration(log);
  const isActive=ls.timedActive===`${exIdx}-dur`;
  const isEdName=ls.editField===`${exIdx}:name`;

  let h=`<div class="ls-card"><div class="ls-card-head"><div style="flex:1">`;
  if(isEdName)h+=`<input autofocus value="${esc(ls.editVal)}" style="background:rgba(45,90,60,.3);border:1px solid var(--al);border-radius:6px;padding:4px 8px;color:var(--t);font-size:16px;font-weight:700;width:100%" onblur="lsSaveEdit()" onkeydown="if(event.key==='Enter')lsSaveEdit();if(event.key==='Escape')lsCancelEdit()">`;
  else h+=`<span class="ls-ex-name" onclick="lsStartEdit('${exIdx}:name','${esc(log.name)}')">${esc(log.name)}</span>`;
  h+=`<div class="ls-meta"><span class="ls-type-badge" style="background:var(--ad);color:var(--al)">⏳ DURATION</span>
    <span style="font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace">${log.sets.length}×${sec}s</span>`;
  if(log.restSec>0)h+=`<span class="ls-rest-badge">Rest ${log.restSec}s</span>`;
  h+=`</div>`;
  if(log.notes)h+=`<span class="ls-notes">${esc(log.notes)}</span>`;
  h+=`</div><div class="ls-pill"><span class="ls-pill-n">${isDone?1:0}</span><span class="ls-pill-s">/</span><span class="ls-pill-d">1</span></div></div>`;

  h+=`<div style="padding:0 14px 14px">`;
  if(isActive&&ls.timedRunning){
    h+=`<div style="text-align:center;padding:10px 0">
      <div class="mono" style="font-size:40px;font-weight:700;color:var(--al);letter-spacing:2px" id="lsTimedDisp">${fmtTimer(ls.timedSec)}</div>
      <button class="btn" style="margin-top:10px;width:auto;padding:10px 28px" onclick="lsFinishDuration(${exIdx})">Done ✓</button></div>`;
  }else if(isDone){
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span style="color:var(--al);font-size:17px">✓ Completed</span><span style="color:var(--t2);font-size:13px">${sec}s</span></div>`;
  }else{
    h+=`<button class="ls-big-start" onclick="lsStartTimed('${exIdx}-dur',${sec})">Start Timer — ${sec}s</button>`;
  }
  h+=`</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════════
// LIVE SESSION HANDLERS
// ═══════════════════════════════════════════════════════════════
function lsToggleSet(exIdx,sIdx){
  if(!state.activeSession)return;
  const log=state.activeSession.logs[exIdx];
  const set=log.sets[sIdx];
  set.done=!set.done;
  if(set.done){
    set.weight=getSetVal(exIdx,sIdx,'weight');
    set.reps=getSetVal(exIdx,sIdx,'reps');
    // Check if all sets done → prompt rest
    if(log.sets.every(s=>s.done)&&exIdx<state.activeSession.logs.length-1){
      setTimeout(()=>lsPromptRest(exIdx),300);
    }
  }
  renderLift();
}

function lsToggleRound(exIdx,roundId){
  const key=`${exIdx}-${roundId}`;
  if(ls.completedRounds[key])delete ls.completedRounds[key];
  else{
    ls.completedRounds[key]={time:Date.now()};
    const log=state.activeSession.logs[exIdx];
    const rounds=log.rounds||[];
    if(rounds.length&&rounds.every(r=>ls.completedRounds[`${exIdx}-${r.id}`])&&exIdx<state.activeSession.logs.length-1){
      setTimeout(()=>lsPromptRest(exIdx),300);
    }
  }
  renderLift();
}

// Round editing
function lsStartRoundEdit(exIdx,rIdx,action){ls.editField=`${exIdx}:round:${rIdx}`;ls.editVal=action;renderLift();setTimeout(()=>{const inp=document.getElementById('rdAct');if(inp){inp.focus();inp.select();}},30)}
function lsSaveRound(exIdx,rIdx){
  const log=state.activeSession.logs[exIdx];
  if(!log.rounds||!log.rounds[rIdx]){lsCancelEdit();return;}
  const actEl=document.getElementById('rdAct');
  const durEl=document.getElementById('rdDur');
  const unitEl=document.getElementById('rdUnit');
  if(actEl)log.rounds[rIdx].action=actEl.value||log.rounds[rIdx].action;
  if(durEl)log.rounds[rIdx].duration=parseInt(durEl.value)||log.rounds[rIdx].duration;
  if(unitEl)log.rounds[rIdx].unit=unitEl.value;
  ls.editField=null;ls.editVal='';renderLift();
}
function lsDeleteRound(exIdx,rIdx){
  const log=state.activeSession.logs[exIdx];
  if(!log.rounds||log.rounds.length<=1)return;
  const removed=log.rounds[rIdx];
  delete ls.completedRounds[`${exIdx}-${removed.id}`];
  log.rounds.splice(rIdx,1);
  renderLift();
}
function lsAddRound(exIdx){
  const log=state.activeSession.logs[exIdx];
  if(!log.rounds)log.rounds=[];
  const last=log.rounds[log.rounds.length-1];
  const newId=`${Date.now()}-${log.rounds.length}`;
  const cycle=last?last.cycle:1;
  log.rounds.push({action:last?.action||'Run',duration:last?.duration||2,unit:last?.unit||'min',id:newId,cycle});
  renderLift();
}

function lsAddSet(exIdx){
  if(!state.activeSession)return;
  state.activeSession.logs[exIdx].sets.push({weight:'',reps:'',done:false});
  ls.showLpMenu=null;renderLift();
}
function lsRemoveSet(exIdx){
  if(!state.activeSession)return;
  const log=state.activeSession.logs[exIdx];
  if(log.sets.length<=1)return;
  const last=log.sets.length-1;
  log.sets.pop();
  delete ls.overrides[`${exIdx}-${last}`];
  ls.showLpMenu=null;renderLift();
}

// Inline editing
function lsStartEdit(field,value){ls.editField=field;ls.editVal=value||'';renderLift();setTimeout(()=>{const inp=document.querySelector('#screen-lift input[autofocus]');if(inp){inp.focus();inp.select();}},30)}
function lsCancelEdit(){ls.editField=null;ls.editVal='';renderLift()}
function lsSaveEdit(){
  if(!ls.editField||!state.activeSession){ls.editField=null;renderLift();return;}
  const [exIdxS,field]=ls.editField.split(':');
  const exIdx=parseInt(exIdxS);
  const log=state.activeSession.logs[exIdx];
  if(field==='name')log.name=ls.editVal||log.name;
  if(field==='notes')log.notes=ls.editVal;
  ls.editField=null;ls.editVal='';renderLift();
}
function lsSaveSetEdit(exIdx,sIdx,field){
  const val=ls.editVal===''?null:Number(ls.editVal);
  const key=`${exIdx}-${sIdx}`;
  ls.overrides[key]={...(ls.overrides[key]||{}),[field]:val};
  // Also write to the set data
  const log=state.activeSession.logs[exIdx];
  if(log.sets[sIdx])log.sets[sIdx][field]=val||'';
  // Show apply prompt if not last set
  if(val!==null&&sIdx<log.sets.length-1){
    ls.applyPrompt={exIdx,sIdx,field,value:val};
    clearTimeout(ls.applyTimer);
    ls.applyTimer=setTimeout(()=>{ls.applyPrompt=null;renderLift()},5000);
  }
  ls.editField=null;ls.editVal='';renderLift();
}

function lsApplyToRemaining(){
  if(!ls.applyPrompt)return;
  const{exIdx,sIdx,field,value}=ls.applyPrompt;
  const log=state.activeSession.logs[exIdx];
  for(let i=sIdx+1;i<log.sets.length;i++){
    const k=`${exIdx}-${i}`;
    ls.overrides[k]={...(ls.overrides[k]||{}),[field]:value};
    log.sets[i][field]=value;
  }
  ls.applyPrompt=null;clearTimeout(ls.applyTimer);renderLift();
}

// Rest timer
function lsPromptRest(exIdx){
  const log=state.activeSession.logs[exIdx];
  const sec=log.restSec||30;
  openModal(`<div style="text-align:center;padding:16px">
    <div style="font-size:36px;margin-bottom:8px">⏸</div>
    <h3 style="font-size:20px;font-weight:700;margin-bottom:4px">Rest Period</h3>
    <p style="font-size:13px;color:var(--t2);margin-bottom:16px">Exercise complete! Take a breather?</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">${[15,30,45,60,90,120].map(s=>`<button class="btn-sm" style="padding:10px;font-size:14px;font-family:'JetBrains Mono',monospace;${s===sec?'background:var(--a);color:#fff':''}" onclick="lsStartRest(${s})">${s<60?s+'s':(s/60)+'m'}</button>`).join('')}</div>
    <button class="btn" onclick="lsStartRest(${sec})">Start Rest — ${sec}s</button>
    <button style="width:100%;padding:12px;background:transparent;border:none;color:var(--t2);font-size:14px;cursor:pointer;margin-top:4px" onclick="closeModal()">Skip Rest →</button>
  </div>`);
}
function lsStartRest(sec){
  closeModal();ls.restActive=true;ls.restSec=sec;renderLift();
  clearInterval(restInterval);
  restInterval=setInterval(()=>{
    ls.restSec--;
    const d=document.getElementById('lsRestDisplay');
    if(d)d.textContent=fmtTimer(Math.max(0,ls.restSec));
    if(ls.restSec<=0){clearInterval(restInterval);ls.restActive=false;renderLift();}
  },1000);
}
function lsSkipRest(){clearInterval(restInterval);ls.restActive=false;ls.restSec=0;renderLift()}

function lsShowAddRest(exIdx){
  openModal(`<div style="text-align:center;padding:16px">
    <h3 style="font-size:20px;font-weight:700;margin-bottom:16px">Add Rest Period</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">${[15,30,45,60,90,120].map(s=>`<button class="btn-sm" style="padding:10px;font-size:14px;font-family:'JetBrains Mono',monospace" onclick="state.activeSession.logs[${exIdx}].restSec=${s};closeModal();renderLift()">${s<60?s+'s':(s/60)+'m'}</button>`).join('')}</div>
  </div>`);
}

// Timed exercises
function lsStartTimed(key,sec){
  ls.timedActive=key;ls.timedSec=sec;ls.timedRunning=true;renderLift();
  clearInterval(ls.timedInterval);
  ls.timedInterval=setInterval(()=>{
    ls.timedSec--;
    const d=document.getElementById('lsTimedDisp');
    if(d)d.textContent=fmtTimer(Math.max(0,ls.timedSec));
    if(ls.timedSec<=0){clearInterval(ls.timedInterval);ls.timedRunning=false;renderLift();}
  },1000);
}
function lsFinishTimedRound(exIdx,roundId){
  clearInterval(ls.timedInterval);ls.timedRunning=false;ls.timedActive=null;
  lsToggleRound(exIdx,roundId);
}
function lsFinishDuration(exIdx){
  clearInterval(ls.timedInterval);ls.timedRunning=false;ls.timedActive=null;
  if(state.activeSession.logs[exIdx].sets[0])state.activeSession.logs[exIdx].sets[0].done=true;
  if(exIdx<state.activeSession.logs.length-1)setTimeout(()=>lsPromptRest(exIdx),300);
  renderLift();
}

// Swipe handling
function lsTS(e,exIdx,sIdx){
  const t=e.touches[0];
  ls.swipeState[`${exIdx}-${sIdx}`]={x:t.clientX,y:t.clientY,time:Date.now(),lpTimer:setTimeout(()=>{ls.showLpMenu=`${exIdx}-${sIdx}`;if(navigator.vibrate)navigator.vibrate(25);renderLift();},500)};
}
function lsTM(e,exIdx,sIdx){
  const st=ls.swipeState[`${exIdx}-${sIdx}`];if(!st)return;
  const dx=e.touches[0].clientX-st.x;
  const dy=e.touches[0].clientY-st.y;
  if(Math.abs(dy)>Math.abs(dx)+5){clearTimeout(st.lpTimer);return;}
  if(Math.abs(dx)>8)clearTimeout(st.lpTimer);
  const clamped=Math.max(-85,Math.min(85,dx));
  const row=document.getElementById(`sr-${exIdx}-${sIdx}`);
  if(row)row.style.transform=`translateX(${clamped}px)`;
  const lbl=document.getElementById(`swL-${exIdx}-${sIdx}`);
  const rbr=document.getElementById(`swR-${exIdx}-${sIdx}`);
  if(lbl)lbl.style.opacity=dx>15?'1':'0';
  if(rbr)rbr.style.opacity=dx<-15?'1':'0';
  // visual bg
  const wrap=document.getElementById(`srow-${exIdx}-${sIdx}`);
  if(wrap){
    if(dx>15)wrap.style.background='rgba(45,90,61,.15)';
    else if(dx<-15)wrap.style.background='rgba(201,69,58,.1)';
    else wrap.style.background='';
  }
  st.dx=clamped;
}
function lsTE(e,exIdx,sIdx,totalSets){
  const st=ls.swipeState[`${exIdx}-${sIdx}`];if(!st){return;}
  clearTimeout(st.lpTimer);
  if((st.dx||0)>50)lsAddSet(exIdx);
  else if((st.dx||0)<-50&&totalSets>1)lsRemoveSet(exIdx);
  else{const row=document.getElementById(`sr-${exIdx}-${sIdx}`);if(row)row.style.transform='';}
  delete ls.swipeState[`${exIdx}-${sIdx}`];
}

function renderLog(){
  let h=`<div class="top-bar"><div class="h1">Log</div><div class="muted">${state.sessions.length} sessions recorded</div></div><div style="padding:0 16px 20px">`;
  if(!state.sessions.length){h+=`<div class="card" style="text-align:center;padding:32px"><div class="muted">No sessions logged yet.</div></div>`}
  else state.sessions.forEach(s=>{
    const vol=totalVolume(s);
    h+=`<div class="card"><div class="row" style="justify-content:space-between;margin-bottom:6px"><div>
      <div class="h3">${esc(s.routineName)}</div>
      <div style="font-size:12px;color:var(--t2)">${fmtDateFull(s.date)}</div>
    </div><div style="text-align:right">
      <div class="mono" style="font-size:15px;font-weight:800;color:var(--al)">${volDisplay(vol)} lbs</div>
      <div style="font-size:11px;color:var(--t2)">${fmtTime(s.duration)} · ${s.completedSets}/${s.totalSets} sets</div>
    </div></div>`;
    if(s.logs){h+=`<div style="border-top:1px solid var(--b);padding-top:8px;margin-top:4px">`;
      s.logs.forEach(l=>{const ex=getEx(l.exerciseId);const ds=l.sets.filter(x=>x.done);
        if(ds.length)h+=`<div style="font-size:12px;color:var(--t2);padding:2px 0"><span style="color:var(--t);font-weight:600">${esc(l.name||ex.name)}</span>: ${ds.map(x=>(x.weight||0)+'×'+(x.reps||0)).join(', ')}</div>`;
      });h+='</div>'}
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('screen-log').innerHTML=h;
}

  }

  state.coachMessages.forEach(m=>{

function startSession(routineId){
  const rt=getRt(routineId);if(!rt)return;
  // Reset live session state
  ls={overrides:{},applyPrompt:null,applyTimer:null,editField:null,editVal:'',timedActive:null,timedSec:0,timedRunning:false,timedInterval:null,restActive:false,restSec:0,completedRounds:{},showLpMenu:null,swipeState:{}};
  state.activeSession={routineId,startTime:Date.now(),logs:rt.exercises.map(re=>{
    const ex=getEx(re.exerciseId);
    const log={
      exerciseId:re.exerciseId,name:ex.name,notes:re.notes||'',
      targetSets:re.sets,targetReps:re.reps,restSec:re.restSec,
      sets:Array.from({length:re.sets},()=>({weight:'',reps:'',done:false}))
    };
    // Materialize timed rounds so they become editable data
    const type=detectType(log);
    if(type==='timed'){
      const parsed=parseTimedRounds(log);
      if(parsed)log.rounds=parsed;
    }
    return log;
  })};
  state.sessionTimer=0;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{state.sessionTimer++;const el=document.querySelector('#screen-lift .mono[style*="font-size:22px"]');if(el)el.textContent=fmtTimer(state.sessionTimer)},1000);
  closeModal();switchTab('lift');
}

function finishSession(){
  if(!state.activeSession)return;
  clearInterval(timerInterval);clearInterval(restInterval);clearInterval(ls.timedInterval);
  const as=state.activeSession;const rt=getRt(as.routineId);
  let completedSets=0,totalSets=0;
  as.logs.forEach((log,exIdx)=>{
    const type=detectType(log);
    if(type==='timed'){const rounds=log.rounds||[];totalSets+=rounds.length;completedSets+=rounds.filter(r=>ls.completedRounds[`${exIdx}-${r.id}`]).length;}
    else{totalSets+=log.sets.length;completedSets+=log.sets.filter(s=>s.done).length;}
  });
  state.sessions.unshift({id:uid(),routineId:as.routineId,routineName:rt?.name||'Unknown',date:new Date().toISOString(),duration:state.sessionTimer,logs:as.logs,completedSets,totalSets});
  state.activeSession=null;state.sessionTimer=0;
  ls={overrides:{},applyPrompt:null,applyTimer:null,editField:null,editVal:'',timedActive:null,timedSec:0,timedRunning:false,timedInterval:null,restActive:false,restSec:0,completedRounds:{},showLpMenu:null,swipeState:{}};
  save();switchTab('dash');
}

function importSingleRoutine(parsed){
  const exs=(parsed.exercises||[]).map(e=>{
    let exId=state.exercises.find(x=>x.name.toLowerCase()===e.name.toLowerCase())?.id;
    if(!exId){exId=uid();state.exercises.push({id:exId,name:e.name,muscles:e.muscles||[],equipment:e.equipment||'Bodyweight',notes:e.notes||''})}
    return{exerciseId:exId,sets:e.sets||1,reps:String(e.reps||'1'),restSec:e.restSec||60,notes:e.notes||''};
  });
  const newRt={id:uid(),name:parsed.name,description:parsed.description||'',color:parsed.color||'#2d5a3d',exercises:exs};
  state.routines.push(newRt);return newRt.name;
}

async function handleImageImport(file){

  try{

    const text=await callAI(IMG_PROMPT,[{role:'user',content:[{type:'image',source:{type:'base64',media_type:imgData.type,data:imgData.b64}},{type:'text',text:'Parse every workout routine visible. Include ALL days if multiple.'}]}],4000);
    const parsed=parseJSON(text);

window._coachLoading=false;
async function sendCoachMsg(preset){
  const input=document.getElementById('coachInput');
  const msg=preset||(input?input.value:'');if(!msg?.trim())return;
  state.coachMessages.push({role:'user',content:msg,display:msg});
  if(input)input.value='';window._coachLoading=true;renderCoach();
  try{
    let ctx=`User: ${state.profile.name}, ${state.profile.age}yo, ${state.profile.experience} lifter.\n`;
    ctx+=`Routines: ${state.routines.map(r=>r.name+' ('+r.exercises.map(e=>getEx(e.exerciseId).name).join(', ')+')').join(' | ')}\n`;
    if(state.coachRoutineId){const rt=getRt(state.coachRoutineId);if(rt){ctx+=`\nCOACHING: "${rt.name}"\n`;rt.exercises.forEach((e,i)=>{const ex=getEx(e.exerciseId);ctx+=`${i+1}. ${ex.name} ${e.sets}x${e.reps} rest ${e.restSec}s\n`})}}
    const recent=state.sessions.slice(0,5).map(s=>`${s.routineName} ${fmtDate(s.date)}: ${s.completedSets}/${s.totalSets} sets`).join('\n');
    if(recent)ctx+=`\nRecent:\n${recent}`;
    const text=await callAI(`You are APEX Coach, expert AI strength coach. Coach on FULL ROUTINES. Be direct. When creating routines, include JSON in \`\`\`json...\`\`\`: {"name":...,"description":...,"color":"#hex","exercises":[{"name":...,"sets":N,"reps":"...","restSec":N,"muscles":[...],"equipment":"...","notes":"..."}]}\n\nContext:\n${ctx}`,state.coachMessages.map(m=>({role:m.role,content:m.content})));
    const jsonMatch=text.match(/```json\s*([\s\S]*?)```/);let parsed=null;
    if(jsonMatch){try{parsed=JSON.parse(jsonMatch[1])}catch{}}
    const display=text.replace(/```json[\s\S]*?```/g,parsed?'[See routine below]':'');
    state.coachMessages.push({role:'assistant',content:text,display,parsed});
  }catch(e){state.coachMessages.push({role:'assistant',content:'Error',display:'Error: '+e.message})}
  window._coachLoading=false;renderCoach();
}

function deleteRoutine(id){if(confirm('Delete?')){state.routines=state.routines.filter(r=>r.id!==id);save();closeModal();render()}}

function openAddExercise(){
  openModal(`<div class="row" style="justify-content:space-between;margin-bottom:16px">
    <div class="h1">Add Exercise</div><button style="background:none;padding:8px;color:var(--t)" onclick="closeModal()">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><div class="label">Name</div><input id="newExName" placeholder="Exercise name"></div>
      <div><div class="label">Muscles</div><div id="muscleSelect" style="display:flex;flex-wrap:wrap;gap:4px">${MUSCLES.map(m=>`<button class="btn-sm" data-m="${m}" onclick="this.classList.toggle('sel');this.style.background=this.classList.contains('sel')?'var(--a)':'';this.style.color=this.classList.contains('sel')?'#fff':''">${m}</button>`).join('')}</div></div>
      <div><div class="label">Equipment</div><select id="newExEquip">${EQUIP.map(e=>`<option>${e}</option>`).join('')}</select></div>
    </div><button class="btn" style="margin-top:16px" onclick="saveNewExercise()">Add Exercise</button>`);
}
function saveNewExercise(){
  const name=document.getElementById('newExName')?.value;if(!name?.trim())return;
  const muscles=[...document.querySelectorAll('#muscleSelect .sel')].map(b=>b.dataset.m);
  state.exercises.push({id:uid(),name:name.trim(),muscles,equipment:document.getElementById('newExEquip')?.value||'Bodyweight',notes:''});
  save();closeModal();renderConfig();
}

// ═══════════════════════════════════════════════════════════════
// DATA MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function exportData(){
  const d=JSON.stringify({exercises:state.exercises,routines:state.routines,sessions:state.sessions,profile:state.profile},null,2);
  const b=new Blob([d],{type:'application/json'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=`apex-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);
}
function importDataFile(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const t=await f.text();const d=JSON.parse(t);
    if(d.exercises)state.exercises=d.exercises;if(d.routines)state.routines=d.routines;
    if(d.sessions)state.sessions=d.sessions;if(d.profile)Object.assign(state.profile,d.profile);
    save();render();alert('Data imported!')}catch{alert('Invalid file.')}};i.click();
}
function resetData(){
  if(!confirm('Reset ALL data?'))return;
  state.exercises=[...SEED_EX];state.routines=JSON.parse(JSON.stringify(SEED_RT));state.sessions=[];
  state.profile={name:'Paul',age:51,weight:'',height:'',experience:'Intermediate'};save();render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════════
function render(){renderDash();renderLift();renderLog();renderCoach();renderConfig();
  document.querySelectorAll('.tab-btn').forEach(b=>{if(b.dataset.tab==='lift')b.classList.toggle('has-session',!!state.activeSession)})}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
load();render();
</script>
